# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: Compowp deployment workflow. Cannot be run standalone, must be called from a parent workflow with the appropriate JSON configuration and secrets.

on:
  workflow_call:
    inputs:
      config_json:
        description: "The JSON configuration object (DEPLOY_CONFIG)"
        required: true
        type: string
    secrets:
      # This allows the workflow to access 'GLOBAL_KEY' and any dynamic 'PROD_KEY' from the Caller Repository (using secrets: inherit)
      GLOBAL_KEY:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # STEP 1: LOAD CONFIGURATION : Parses the JSON Input based on the current branch
      - name: 🔍 Load Environment Config
        id: config
        run: |
          # 1. Dump the JSON input to a file so jq can read it
          # We wrap it in single quotes to handle special characters safely
          echo '${{ inputs.config_json }}' > deploy_config.json

          # 2. Determine Target Branch (Shell Logic)
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
             TARGET_REF="refs/heads/main"
             TRIGGER_SOURCE="Sub-Package: ${{ github.event.client_payload.package_name }}"
          else
             TARGET_REF="${{ github.ref }}"
             TRIGGER_SOURCE="Manual Push: ${{ github.actor }}"
          fi

          echo "TRIGGER_SOURCE=$TRIGGER_SOURCE" >> $GITHUB_ENV
          echo "Using Target Ref: $TARGET_REF"

          # 3. Extract Values using JQ
          # usage: jq -r --arg key "$VAR" '.[$key].field' file.json

          ENV_NAME=$(jq -r --arg ref "$TARGET_REF" '.[$ref].env_name // empty' deploy_config.json)

          # Safety Check
          if [ -z "$ENV_NAME" ]; then
            echo "❌ No configuration found for: $TARGET_REF"
            echo "Available keys in config:"
            jq keys deploy_config.json
            exit 1
          fi

          # Export Variables
          echo "ENV_NAME=$ENV_NAME" >> $GITHUB_ENV
          echo "SECRET_PREFIX=$(jq -r --arg ref "$TARGET_REF" '.[$ref].secret_prefix' deploy_config.json)" >> $GITHUB_ENV
          echo "DEPLOY_HOST=$(jq -r --arg ref "$TARGET_REF" '.[$ref].host' deploy_config.json)" >> $GITHUB_ENV
          echo "DEPLOY_PORT=$(jq -r --arg ref "$TARGET_REF" '.[$ref].port' deploy_config.json)" >> $GITHUB_ENV
          echo "DEPLOY_USER=$(jq -r --arg ref "$TARGET_REF" '.[$ref].user' deploy_config.json)" >> $GITHUB_ENV
          echo "DEPLOY_PATH=$(jq -r --arg ref "$TARGET_REF" '.[$ref].path' deploy_config.json)" >> $GITHUB_ENV

      # STEP 2: EXECUTE DEPLOYMENT
      - name: 🚀 Deploy to ${{ env.ENV_NAME }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          port: ${{ env.DEPLOY_PORT }}
          username: ${{ env.DEPLOY_USER }}

          # KEY FALLBACK LOGIC:
          # 1. Look for specific key in Caller's secrets (e.g. STAGING_KEY)
          # 2. If missing, use GLOBAL_KEY from Caller's secrets
          key: ${{ secrets[format('{0}_KEY', env.SECRET_PREFIX)] || secrets.GLOBAL_KEY }}

          # Increase timeout for Composer
          command_timeout: 30m

          script: |
            # 1. Start at Home (as requested)
            cd ~
            echo "🔌 Connected to $(hostname) as $(whoami)"

            # 2. Go to Project
            cd ${{ env.DEPLOY_PATH }}
            echo "📂 Working in: $(pwd)"

            echo "🔄 Update triggered by: ${{ env.TRIGGER_SOURCE }}"

            # 3. SMART UPDATE (Lock File Diff)

            # A. Snapshot current lock file
            [ -f composer.lock ] && cp composer.lock composer.lock.old || echo "{}" > composer.lock.old

            echo "📦 Running Composer Update..."

            # B. Run Update (Capture errors to log)
            # Using 'touch' to prove write access
            touch probe.txt
            composer update --no-interaction --prefer-dist --optimize-autoloader > update.log 2>&1
            EXIT_CODE=$?

            # C. Trigger PHP Logger
            # (Uncomment when you have uploaded the script)
            # php scripts/deployment_logger.php \
            #    --before="composer.lock.old" \
            #    --after="composer.lock" \
            #    --log="update.log" \
            #    --code=$EXIT_CODE \
            #    --trigger="${{ env.TRIGGER_SOURCE }}"

            # D. Cleanup
            # rm composer.lock.old update.log

            # E. Handle Failure
            if [ $EXIT_CODE -ne 0 ]; then
                echo "❌ Deployment Failed. Check logs."
                exit 1
            else
                echo "✅ Deployment Successful."
            fi
